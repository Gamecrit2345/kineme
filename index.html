<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KINEME - Philippine Political News</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #0a0a0a;
      color: #fff;
      text-align: center;
    }
    h1 { color: #ff0000; margin-bottom: 5px; }
    .news { 
      max-width: 800px; 
      margin: 20px auto; 
      text-align: left; 
      background: #1a1a1a; 
      padding: 20px; 
      border-radius: 10px; 
    }
    button {
      padding: 12px 25px;
      font-size: 16px;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 5px;
      margin: 10px;
      cursor: pointer;
    }
    .ad-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      color: #000;
      padding: 30px 40px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(255,0,0,0.9);
      z-index: 9999;
      max-width: 420px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>📰 KINEME</h1>
  <p><strong>Philippine Political News</strong></p>

  <div class="news">
    <h2>Volunteer lawyers backing up impeach team</h2>
    <p><strong>By: Gabriel Pabico Lalu, Kenneth Christiane Basilio — INQUIRER.net</strong></p>
    <p>June 12, 2026</p>
    <p>MANILA, Philippines — Instead of the “bloodbath” she claimed...</p>
  </div>

  <button onclick="scanNow()">🔍 Scan for Latest News</button>
  <button onclick="showAd()">Test Ad</button>

  <!-- Pop-up Advertisement -->
  <div id="adPopup" class="ad-popup">
    <h2>📢 Kineme Advertisement</h2>
    <p id="adText" style="font-size:18px;"></p>
    <br>
    <button onclick="closeAd()" style="background:#ff0000;">Close</button>
  </div>

  <script>
    const ads = [
      "🔥 Star this repo para mas maraming updates! ⭐",
      "💰 Gusto mo ng custom website o tool? Message me!",
      "❤️ Support Gamecrit2345 on GitHub",
      "🛡️ Educational & Simulation Project Only",
      "🚀 More exciting projects coming soon!",
      "Like & Share para lumabas pa ang iba pang balita!"
    ];

    function showAd() {
      const randomAd = ads[Math.floor(Math.random() * ads.length)];
      document.getElementById('adText').innerHTML = randomAd;
      document.getElementById('adPopup').style.display = 'block';
    }

    function closeAd() {
      document.getElementById('adPopup').style.display = 'none';
    }

    // Auto pop-up every 15-25 seconds
    setInterval(() => {
      if (Math.random() > 0.3) showAd();
    }, 18000);

    // First ad after 6 seconds
    setTimeout(showAd, 6000);

    function scanNow() {
      alert("🔍 Scanning for latest impeachment updates... (Simulation)");
      setTimeout(showAd, 800);
    }
  </script>

</body>
</html>
